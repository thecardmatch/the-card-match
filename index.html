<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"
    />
    <title>The Card Match</title>

    <!-- Browser tab + Apple touch icon (re-upload public/logo.png to your repo) -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- ============================================================
         PWA — installable, standalone, light theme.
         theme-color #ffffff matches the white app background defined
         in src/index.css (--background: 0 0% 100%) so the mobile
         status bar blends with the app.
         ============================================================ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="The Card Match" />

    <meta
      name="description"
      content="Swipe sports & Pokémon cards. Save, pass, or buy instantly from eBay."
    />

    <!-- Inter font — referenced by --app-font-sans in src/index.css -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
